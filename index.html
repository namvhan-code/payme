<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - อนงค์นุช เพชรสังฆาตร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background: linear-gradient(135deg, #fff9fb 0%, #fcecf2 100%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 1); }
        .virtual-card { transition: all 0.3s ease; }
        .virtual-card:active { transform: scale(0.98); }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="flex flex-col items-center py-6 px-4 text-brown-600">

    <div class="max-w-[420px] w-full space-y-5">
        
        <div class="text-center">
            <h1 class="text-2xl font-bold text-pink-500">Payment</h1>
            <p class="text-sm text-brown-400">กรุณาตรวจสอบข้อมูลก่อนโอนนะคะ</p>
        </div>

        <div class="glass-card rounded-[40px] p-4 shadow-xl">
            <!-- ส่วนเพิ่มรูปภาพ -->
            <div class="mb-4">
                <img src="https://i.postimg.cc/yYXXLQnm/att-YZKp-Oou02U1m01U9E7IVQ5yixn-Mty-Ak-Ll-S0rpd-OVE00.jpg" alt="ร้านลมหนาว" class="w-full h-48 object-cover rounded-[28px] border-4 border-white shadow-md">
            </div>

            <!-- QR Code Section -->
            <div class="rounded-[28px] overflow-hidden border-[4px] border-white shadow-sm mb-4">
                <img src="https://i.postimg.cc/yYXXLQnm/att-YZKp-Oou02U1m01U9E7IVQ5yixn-Mty-Ak-Ll-S0rpd-OVE00.jpg" alt="QR Code" class="w-full h-auto">
            </div>

            <div class="text-center font-bold text-lg text-pink-500 mb-4">Name : อนงค์นุช เพชรสังฆาตร</div>

            <div class="space-y-3">
                <!-- K-Bank -->
                <div class="virtual-card bg-gradient-to-r from-pink-300 to-pink-400 rounded-2xl p-4 flex justify-between items-center cursor-pointer" onclick="copyText('165-374-8740', this)">
                    <div class="text-white">
                        <div class="text-xs opacity-80">กสิกรไทย</div>
                        <div class="font-bold text-lg tracking-widest">165-374-8740</div>
                    </div>
                    <div class="text-white text-xs bg-white/20 px-3 py-1 rounded-full">คัดลอก</div>
                </div>

                <!-- TrueMoney -->
                <div class="virtual-card bg-gradient-to-r from-pink-400 to-pink-500 rounded-2xl p-4 flex justify-between items-center cursor-pointer" onclick="copyText('096-793-6500', this)">
                    <div class="text-white">
                        <div class="text-xs opacity-80">TrueMoney</div>
                        <div class="font-bold text-lg tracking-widest">096-793-6500</div>
                    </div>
                    <div class="text-white text-xs bg-white/20 px-3 py-1 rounded-full">คัดลอก</div>
                </div>

                <!-- Note -->
                <div class="bg-white border-2 border-dashed border-pink-200 rounded-2xl p-4 cursor-pointer" onclick="copyText('ซื้อขายกับร้านลมหนาว', this)">
                    <div class="text-xs text-brown-400 mb-1">ข้อความแนบสลิป (คลิกเพื่อคัดลอก):</div>
                    <div class="font-bold text-pink-500">"ซื้อขายกับร้านลมหนาว"</div>
                </div>

                <!-- ปุ่มส่งสลิป -->
                <a href="https://lin.ee/PnFBgtZ" target="_blank" class="block w-full bg-green-500 text-white text-center font-bold py-4 rounded-2xl shadow-lg hover:bg-green-600 transition">
                    ส่งสลิปทาง LINE
                </a>
            </div>
        </div>
    </div>

    <script>
        function copyText(text, el) {
            navigator.clipboard.writeText(text);
            const originalText = el.innerHTML;
            el.innerHTML = '<span class="text-white font-bold">คัดลอกแล้ว!</span>';
            setTimeout(() => el.innerHTML = originalText, 2000);
        }
    </script>
</body>
</html>
